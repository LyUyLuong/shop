spring:
  application:
    name: shop

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  task:
    scheduling:
      pool:
        size: ${SCHEDULING_POOL_SIZE:3}
      thread-name-prefix: shop-scheduler-

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

app:
  public-api-url: ${APP_PUBLIC_API_URL:http://localhost:8081}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  jwt:
    secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-bytes-long}
    access-token-ttl: PT15M
    issuer: shop

  s3:
    bucket: ${S3_BUCKET:your-shop-product-images-bucket}
    region: ${AWS_REGION:ap-southeast-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    presigned-url-expiry: PT15M
    product-image-prefix: ${S3_PRODUCT_IMAGE_PREFIX:products}
    public-base-url: ${S3_PUBLIC_BASE_URL:}

  sqs:
    region: ${AWS_REGION:ap-southeast-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}

  ordering:
    expiry:
      enabled: ${ORDER_EXPIRY_ENABLED:false}
      batch-size: ${ORDER_EXPIRY_BATCH_SIZE:20}
      initial-delay-ms: ${ORDER_EXPIRY_INITIAL_DELAY_MS:60000}
      fixed-delay-ms: ${ORDER_EXPIRY_FIXED_DELAY_MS:30000}

  outbox:
    publisher:
      enabled: ${OUTBOX_PUBLISHER_ENABLED:false}
      queue-url: ${ORDER_EVENTS_QUEUE_URL:}
      max-batch-size: ${OUTBOX_MAX_BATCH_SIZE:10}
      max-retry-count: ${OUTBOX_MAX_RETRY_COUNT:5}
      fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:10000}

  notification:
    consumer:
      enabled: ${NOTIFICATION_CONSUMER_ENABLED:false}
      queue-url: ${ORDER_EVENTS_QUEUE_URL:}
      max-messages: ${NOTIFICATION_CONSUMER_MAX_MESSAGES:10}
      wait-time-seconds: ${NOTIFICATION_CONSUMER_WAIT_TIME_SECONDS:10}
      visibility-timeout-seconds: ${NOTIFICATION_CONSUMER_VISIBILITY_TIMEOUT_SECONDS:30}
      fixed-delay-ms: ${NOTIFICATION_CONSUMER_FIXED_DELAY_MS:10000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
