spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true

  task:
    scheduling:
      pool:
        size: 1

logging:
  level:
    root: WARN
    com.lul.shop: INFO
    org.testcontainers: INFO

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-bytes-long

  ordering:
    expiry:
      enabled: false
