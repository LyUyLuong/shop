name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  BACKEND_IMAGE_ROLE_ARN: ${{ vars.BACKEND_IMAGE_ROLE_ARN }}
  BACKEND_DEPLOY_ROLE_ARN: ${{ vars.BACKEND_DEPLOY_ROLE_ARN }}

jobs:
  backend-ci:
    name: Backend build and test
    runs-on: ubuntu-latest

    env:
      SPRING_PROFILES_ACTIVE: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Run backend tests
        run: mvn -q test

      - name: Build backend jar
        run: mvn -q -DskipTests package

      - name: Upload backend jar artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shop-backend-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 7

  backend-image:
    name: Build and push backend Docker image
    runs-on: ubuntu-latest
    needs: backend-ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.image.outputs.image_tag }}
      sha_image: ${{ steps.image.outputs.sha_image }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate image delivery inputs
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_VARIABLES=(
            AWS_REGION
            AWS_ACCOUNT_ID
            ECR_REPOSITORY
            BACKEND_IMAGE_ROLE_ARN
          )

          for VARIABLE_NAME in "${REQUIRED_VARIABLES[@]}"; do
            if [[ -z "${!VARIABLE_NAME}" ]]; then
              echo "::error::Missing repository variable ${VARIABLE_NAME}"
              exit 1
            fi
          done

          if [[ ! "$AWS_ACCOUNT_ID" =~ ^[0-9]{12}$ ]]; then
            echo "::error::AWS_ACCOUNT_ID must contain exactly 12 digits"
            exit 1
          fi

      - name: Configure AWS credentials by OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.BACKEND_IMAGE_ROLE_ARN }}
          role-session-name: shop-backend-image-${{ github.run_id }}
          role-duration-seconds: 1800
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}
          unset-current-credentials: true

      - name: Verify assumed image identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        with:
          mask-password: "true"

      - name: Derive image tags
        id: image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail

          if [[ -z "$ECR_REGISTRY" ]]; then
            echo "::error::Amazon ECR login did not return a registry"
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_image=${IMAGE_URI}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_image=${IMAGE_URI}:main-latest" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --pull \
            --tag "${{ steps.image.outputs.sha_image }}" \
            --tag "${{ steps.image.outputs.latest_image }}" \
            .

      - name: Push candidate Docker image
        run: docker push "${{ steps.image.outputs.sha_image }}"

      - name: Wait for ECR scan and enforce severity gate
        id: scan
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.image.outputs.image_tag }}
        run: |
          set -Eeuo pipefail

          command -v jq >/dev/null

          SCAN_STATUS="NOT_REGISTERED"
          SCAN_RESULT=""

          for attempt in $(seq 1 60); do
            set +e
            SCAN_OUTPUT="$(
              aws ecr describe-image-scan-findings \
                --region "$AWS_REGION" \
                --repository-name "$ECR_REPOSITORY" \
                --image-id "imageTag=$IMAGE_TAG" \
                --output json 2>&1
            )"
            CLI_EXIT=$?
            set -e

            if [[ "$CLI_EXIT" -ne 0 ]]; then
              if [[ "$SCAN_OUTPUT" == *"ScanNotFoundException"* ]]; then
                echo "Waiting for ECR scan registration: attempt=$attempt"
                sleep 5
                continue
              fi

              printf '%s\n' "$SCAN_OUTPUT" >&2
              exit "$CLI_EXIT"
            fi

            SCAN_RESULT="$SCAN_OUTPUT"
            SCAN_STATUS="$(
              jq -r \
                '.imageScanStatus.status // "NOT_READY"' \
                <<< "$SCAN_RESULT"
            )"

            echo "ECR scan status=$SCAN_STATUS attempt=$attempt"

            case "$SCAN_STATUS" in
              COMPLETE)
                break
                ;;
              IN_PROGRESS|PENDING|ACTIVE|NOT_READY)
                sleep 5
                ;;
              FAILED|UNSUPPORTED_IMAGE|SCAN_ELIGIBILITY_EXPIRED|FINDINGS_UNAVAILABLE|LIMIT_EXCEEDED|IMAGE_ARCHIVED)
                SCAN_DESCRIPTION="$(
                  jq -r \
                    '.imageScanStatus.description // "No description"' \
                    <<< "$SCAN_RESULT"
                )"
                echo "::error::ECR scan ended with status=$SCAN_STATUS: $SCAN_DESCRIPTION"
                exit 1
                ;;
              *)
                echo "Waiting for recognized ECR scan status"
                sleep 5
                ;;
            esac
          done

          if [[ "$SCAN_STATUS" != "COMPLETE" ]]; then
            echo "::error::ECR scan did not complete within 5 minutes; last status=$SCAN_STATUS"
            exit 1
          fi

          CRITICAL_COUNT="$(
            jq -r \
              '.imageScanFindings.findingSeverityCounts.CRITICAL // 0' \
              <<< "$SCAN_RESULT"
          )"

          HIGH_COUNT="$(
            jq -r \
              '.imageScanFindings.findingSeverityCounts.HIGH // 0' \
              <<< "$SCAN_RESULT"
          )"

          MEDIUM_COUNT="$(
            jq -r \
              '.imageScanFindings.findingSeverityCounts.MEDIUM // 0' \
              <<< "$SCAN_RESULT"
          )"

          echo "critical_count=$CRITICAL_COUNT" >> "$GITHUB_OUTPUT"
          echo "high_count=$HIGH_COUNT" >> "$GITHUB_OUTPUT"
          echo "medium_count=$MEDIUM_COUNT" >> "$GITHUB_OUTPUT"

          {
            echo "### ECR vulnerability scan"
            echo ""
            echo "- Image tag: \`$IMAGE_TAG\`"
            echo "- Critical: \`$CRITICAL_COUNT\`"
            echo "- High: \`$HIGH_COUNT\`"
            echo "- Medium: \`$MEDIUM_COUNT\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if (( CRITICAL_COUNT > 0 || HIGH_COUNT > 0 )); then
            echo "::group::Blocking ECR findings"

            aws ecr describe-image-scan-findings \
              --region "$AWS_REGION" \
              --repository-name "$ECR_REPOSITORY" \
              --image-id "imageTag=$IMAGE_TAG" \
              --query "imageScanFindings.findings[?severity=='CRITICAL' || severity=='HIGH'].{Severity:severity,Name:name,URI:uri}" \
              --output table

            echo "::endgroup::"
            echo "::error::ECR scan rejected the image: critical=$CRITICAL_COUNT high=$HIGH_COUNT"
            exit 1
          fi

      - name: Promote scanned image as main-latest
        run: docker push "${{ steps.image.outputs.latest_image }}"

      - name: Write image summary
        run: |
          {
            echo "### Backend image pushed"
            echo ""
            echo "- SHA image: \`${{ steps.image.outputs.sha_image }}\`"
            echo "- Latest image: \`${{ steps.image.outputs.latest_image }}\`"
            echo "- ECR scan: critical=\`${{ steps.scan.outputs.critical_count }}\`, high=\`${{ steps.scan.outputs.high_count }}\`, medium=\`${{ steps.scan.outputs.medium_count }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  backend-deploy:
    name: Deploy backend to EC2 through SSM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    environment:
      name: production-backend

    concurrency:
      group: shop-backend-ec2-deploy
      cancel-in-progress: false

    permissions:
      contents: read
      id-token: write

    env:
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      IMAGE_TAG: ${{ needs.backend-image.outputs.image_tag }}

    steps:
      - name: Validate deployment inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$BACKEND_DEPLOY_ROLE_ARN" ]]; then
            echo "::error::Missing repository variable BACKEND_DEPLOY_ROLE_ARN"
            exit 1
          fi

          if [[ -z "$EC2_INSTANCE_ID" ]]; then
            echo "::error::Missing repository variable EC2_INSTANCE_ID"
            exit 1
          fi

          if [[ -z "$IMAGE_TAG" ]]; then
            echo "::error::backend-image did not provide image_tag"
            exit 1
          fi

          echo "EC2 instance: $EC2_INSTANCE_ID"
          echo "Image tag: $IMAGE_TAG"

      - name: Configure AWS credentials by OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.BACKEND_DEPLOY_ROLE_ARN }}
          role-session-name: shop-backend-deploy-${{ github.run_id }}
          role-duration-seconds: 1800
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}
          unset-current-credentials: true

      - name: Verify assumed deployment identity
        run: aws sts get-caller-identity

      - name: Deploy backend through SSM
        id: deploy
        shell: bash
        run: |
          set -Eeuo pipefail

          COMMAND_ID="$(
            aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$EC2_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy shop backend ${IMAGE_TAG}" \
              --timeout-seconds 600 \
              --parameters "commands=[\"/home/ec2-user/shop/deploy-backend.sh ${IMAGE_TAG}\"]" \
              --query "Command.CommandId" \
              --output text
          )"

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM command ID: $COMMAND_ID"

          FINAL_STATUS=""

          for attempt in $(seq 1 90); do
            set +e
            STATUS_OUTPUT="$(
              aws ssm get-command-invocation \
                --region "$AWS_REGION" \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query "Status" \
                --output text 2>&1
            )"
            CLI_EXIT=$?
            set -e

            if [[ "$CLI_EXIT" -ne 0 ]]; then
              if [[ "$STATUS_OUTPUT" == *"InvocationDoesNotExist"* ]]; then
                echo "Waiting for SSM invocation registration: attempt=$attempt"
                sleep 5
                continue
              fi

              echo "$STATUS_OUTPUT"
              exit "$CLI_EXIT"
            fi

            FINAL_STATUS="$STATUS_OUTPUT"
            echo "SSM status: $FINAL_STATUS, attempt=$attempt"

            case "$FINAL_STATUS" in
              Success|Failed|Cancelled|TimedOut|Cancelling)
                break
                ;;
              Pending|InProgress|Delayed|"")
                sleep 5
                ;;
              *)
                echo "Unexpected SSM status: $FINAL_STATUS"
                sleep 5
                ;;
            esac
          done

          echo "status=${FINAL_STATUS:-UNKNOWN}" >> "$GITHUB_OUTPUT"

          echo "::group::SSM standard output"
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text || true
          echo "::endgroup::"

          echo "::group::SSM standard error"
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text || true
          echo "::endgroup::"

          if [[ "$FINAL_STATUS" != "Success" ]]; then
            echo "::error::Deployment failed with SSM status ${FINAL_STATUS:-UNKNOWN}"
            exit 1
          fi

      - name: Write deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Backend EC2 deployment"
            echo ""
            echo "- Image: \`${{ needs.backend-image.outputs.sha_image }}\`"
            echo "- SSM command: \`${{ steps.deploy.outputs.command_id }}\`"
            echo "- Status: \`${{ steps.deploy.outputs.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
